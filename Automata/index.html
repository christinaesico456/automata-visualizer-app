<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DFA Visualizer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ── HEADER ── -->
    <header>
      <div class="h-brand">
        <div class="h-planet-icon">
          <div class="planet-ring"></div>
        </div>
        <span class="h-title">DFA Visualizer</span>
      </div>

      <!-- MAIN TABS -->
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="ab">Σ = {a, b}</button>
        <button class="tab-btn" data-tab="01">Σ = {0, 1}</button>
      </nav>

      <div class="h-regex" id="headerRegex"></div>
    </header>

    <!-- ── SUB-TAB BAR ── -->
    <div class="sub-tab-bar">
      <button class="sub-tab active" id="sub-dfa" onclick="switchSubTab('dfa')">
        DFA
      </button>
      <button class="sub-tab" id="sub-cfg" onclick="switchSubTab('cfg')">
        CFG
      </button>
      <button class="sub-tab" id="sub-pda" onclick="switchSubTab('pda')">
        PDA
      </button>
    </div>

    <!-- ── PANEL: DFA ── -->
    <div class="app" id="panel-dfa">
      <!-- LEFT: CANVAS AREA -->
      <div class="canvas-wrap">
        <canvas id="dfaCanvas"></canvas>

        <!-- TAPE -->
        <div class="tape-row">
          <div class="tape-label">Tape</div>
          <div class="tape-cells" id="tape"></div>
          <div class="tape-pointer" id="tapePointer">pos <span>—</span></div>
        </div>
      </div>

      <!-- RIGHT: SIDE PANEL -->
      <div class="side">
        <div class="side-block">
          <div class="block-title">Input String</div>
          <div class="input-group">
            <input
              id="inputString"
              type="text"
              placeholder="e.g. aab"
              value="aab"
              maxlength="40"
              spellcheck="false"
              autocomplete="off"
            />
            <button id="loadBtn">Load</button>
          </div>
        </div>

        <div class="side-block">
          <div class="block-title">Status</div>
          <div class="status-grid">
            <div class="stat-card">
              <div class="stat-label">Current State</div>
              <div class="stat-value" id="infoState">—</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Symbol Read</div>
              <div class="stat-value amber" id="infoSymbol">—</div>
            </div>
            <div class="step-card">
              <div class="step-text" id="infoStep">0 / 0</div>
              <div class="step-bar-bg">
                <div class="step-bar-fill" id="stepBar"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="side-block">
          <div class="block-title">Controls</div>
          <div class="ctrl-row">
            <button class="ctrl-btn play-btn" id="playBtn">▶ Play</button>
            <button class="ctrl-btn" id="stepBtn">Step ⏭</button>
            <button class="ctrl-btn" id="resetBtn">↺ Reset</button>
          </div>
          <div class="speed-row">
            <span class="speed-label">Speed</span>
            <input type="range" id="speedSlider" min="1" max="5" value="3" />
            <span class="speed-val" id="speedVal">3×</span>
          </div>
        </div>

        <div class="log-wrap">
          <div class="log-title">Execution Log</div>
          <div id="logList"></div>
        </div>

        <div id="resultBanner"></div>
      </div>
    </div>

    <!-- ── PANEL: CFG ── -->
    <div class="placeholder-panel" id="panel-cfg">
      <div class="ph-content">
        <span class="ph-icon"></span>
        <p class="ph-title">CFG</p>
        <p class="ph-sub">Context-Free Grammar content coming soon.</p>
      </div>
    </div>

    <!-- ── PANEL: PDA ── -->
    <div class="placeholder-panel" id="panel-pda">
      <div class="ph-content">
        <span class="ph-icon"></span>
        <p class="ph-title">PDA</p>
        <p class="ph-sub">Pushdown Automaton content coming soon.</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
